.legend .dot.project { background: var(--project-text); }

  .cat-tab.active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }

    padding: 14px 0; border-bottom: 1px solid var(--border);

  .search-input {

    background: var(--bg-elevated);

    padding: 8px 14px;
    font-size: 0.9rem;
    color: var(--text);

    color: var(--text-dim);

  .scope-btn:last-child { border-radius: 0 6px 6px 0; }
  .scope-btn.active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }

DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Skills — 技能参考手册</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg-elevated: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --tag-bg: #1a2332;
    --tag-text: #79c0ff;
    --card-hover: #1c2128;
    --red: #f85149;
    --green: #3fb950;
    --yellow: #d2991d;
    --purple: #a371f7;
    --global-bg: #1a2e1a;
    --global-text: #7ee787;
    --project-bg: #2a1a1a;
    --project-text: #f77878;
  }

  html { font-size: 15px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  header {
    padding: 40px 0 20px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.5rem; font-weight: 600; }
  header .sub { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }
  .legend { display: flex; gap: 16px; margin-top: 10px; font-size: 0.72rem; flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .legend .dot.global { background: var(--global-text); }
  .header-btns { display: flex; gap: 8px; margin-top: 10px; }
.header-btn {
  display: inline-block; background: var(--bg-elevated);
  border: 1px solid var(--border); color: var(--accent);
  padding: 5px 14px; border-radius: 6px; font-size: 0.8rem;
  text-decoration: none; transition: all 0.15s;
}
.header-btn:hover { border-color: var(--accent); background: rgba(88,166,255,0.08); }
.legend .dot.project { background: var(--project-text); }

  /* Category tabs */
  .cat-nav {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
  }
  .cat-tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    max-height: 120px; overflow-y: auto;
  }
  .cat-tab {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  .cat-tab:hover { color: var(--text); border-color: var(--text-dim); }
  .cat-tab.active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  .cat-tab .count { font-size: 0.65rem; opacity: 0.6; }

  /* Search */
  .search-bar {
    display: flex; gap: 10px; align-items: center;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .search-input {
    flex: 1;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;

"

// ═══════════════════ Rendering ═══════════════════
const container = document.getElementById('skills-container');
const searchInput = document.getElementById('search');
const statsEl = document.getElementById('stats');
const toast = document.getElementById('toast');

let activeCat = null; // null = show all categories collapsed
let activeScope = 'all';

function getFilteredSkills(catId) {
  let skills = skillsByCat[catId] || [];
  if (activeScope === 'global') skills = skills.filter(s => s.scope === 'global');
  if (activeScope === 'project') skills = skills.filter(s => s.scope === 'project');
  return skills;
}

function renderAll() {
  const query = searchInput.value.toLowerCase().trim();
  let html = '';

  categories.forEach(cat => {
    let skills = getFilteredSkills(cat.id);
    if (query) {
      skills = skills.filter(s =>
        s.zh.includes(query) || s.en.includes(query) ||
        s.desc.includes(query) || s.path.includes(query) ||
        s.tags.some(t => t.includes(query))
      );
    }
    if (skills.length === 0) return;

    const gCount = skills.filter(s => s.scope === 'global').length;
    const pCount = skills.filter(s => s.scope === 'project').length;
    const isOpen = activeCat === cat.id;

    html += `<section class="cat-section">
      <div class="cat-header${isOpen ? ' open' : ''}" data-cat="${cat.id}">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-label">${cat.label}</span>
        <span class="cat-count">${skills.length} 项</span>
        <span class="cat-arrow">▶</span>
      </div>`;

    if (isOpen) {
      const scopeParts = [];
      if (gCount > 0) scopeParts.push(`<span class="g">${gCount} 全局</span>`);
      if (pCount > 0) scopeParts.push(`<span class="p">${pCount} 项目</span>`);
      html += `<div class="cat-body open">
        <div class="scope-summary">${scopeParts.join(' · ')}</div>`;
      if (cat.desc) {
        html += `<div style="font-size:0.75rem;color:var(--text-dim);margin-bottom:10px">${cat.desc}</div>`;
      }
      html += `<div class="skill-grid">`;
      skills.forEach(s => {
        html += `<div class="skill-card" data-scope="${s.scope}">
          <div class="card-top">
            <div class="card-name">${s.zh}</div>
            <span class="scope-badge ${s.scope}">${s.scope === 'global' ? '全局' : '项目'}</span>
          </div>
          <div class="card-en">${s.en}</div>
          <div class="card-desc">${s.desc}</div>
          <div class="card-path">📁 ${s.path}</div>
          <div class="card-usage">
            <span class="usage-cmd">${s.usage}</span>
            <button class="copy-btn" data-cmd="${s.usage.replace(/"/g,'&quot;')}">复制</button>
          </div>
          <div class="triggers">${s.tags.map(t => `<span class="trigger-tag">${t}</span>`).join('')}</div>
        </div>`;
      });
      html += `</div></div>`;
    }
    html += `</section>`;
  });

  container.innerHTML = html || '<div style="text-align:center;padding:48px;color:var(--text-dim)">没有匹配的技能</div>';

  // Update stats
  let total = 0;
  Object.values(skillsByCat).forEach(arr => {
    arr.forEach(s => {
      if (activeScope === 'all' || s.scope === activeScope) total++;
    });
  });
  statsEl.innerHTML = query ? `搜索 "<strong>${query}</strong>" — 显示匹配项` : `共 <strong>${total}</strong> 项技能`;
}

function renderTabs() {
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = categories.map(c => {
    const skills = getFilteredSkills(c.id);
    return `<span class="cat-tab${activeCat === c.id ? ' active' : ''}" data-cat="${c.id}">
      ${c.icon} ${c.label} <span class="count">${skills.length}</span>
    </span>`;
  }).join('');
}

// ═══════════════════ Events ═══════════════════

// Category tab clicks
document.getElementById('cat-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  const catId = tab.dataset.cat;
  activeCat = activeCat === catId ? null : catId;
  renderTabs();
  renderAll();
});

// Category header clicks (expand/collapse)
container.addEventListener('click', e => {
  const header = e.target.closest('.cat-header');
  if (header) {
    const catId = header.dataset.cat;
    activeCat = activeCat === catId ? null : catId;
    renderTabs();
    renderAll();
    return;
  }

  // Copy button
  const btn = e.target.closest('.copy-btn');
  if (btn) {
    e.stopPropagation();
    navigator.clipboard.writeText(btn.dataset.cmd).then(() => {
      btn.textContent = '✓ 已复制';
      btn.classList.add('copied');
      toast.classList.add('show');
      setTimeout(() => {
        btn.textContent = '复制';
        btn.classList.remove('copied');
        toast.classList.remove('show');
      }, 1500);
    });
  }
});

// Search
searchInput.addEventListener('input', () => {
  renderTabs();
  renderAll();
});

// Scope filter
document.getElementById('scope-filter').addEventListener('click', e => {
  const btn = e.target.closest('.scope-btn');
  if (!btn) return;
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeScope = btn.dataset.scope;
  activeCat = null;
  renderTabs();
  renderAll();
});

// Init
renderTabs();
renderAll();
</script>
</body>
</html>
