<head>
<meta charset="UTF-8">

<title>Agent Skills 参考手册</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --border: #30363d;
  --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --orange: #d2991d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
}
header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; align-items: center; justify-content: space-between;
  height: 48px; flex-shrink: 0;
}
header h1 { font-size: 1rem; font-weight: 600; color: #f0f6fc; }
header a { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
header a:hover { color: var(--accent); }
.layout { display: flex; height: calc(100vh - 48px); }
.sidebar {
  width: 260px; min-width: 200px; background: var(--bg2);
  border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; flex-shrink: 0;
}
.sidebar-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px; cursor: pointer; font-size: 0.85rem; color: var(--text);
  border-left: 2px solid transparent; transition: background 0.1s; user-select: none;
}
.sidebar-item:hover { background: rgba(88,166,255,0.08); }
.sidebar-item.active { background: rgba(88,166,255,0.12); border-left-color: var(--accent); color: var(--accent); }
.sidebar-item .count { font-size: 0.7rem; color: var(--muted); background: var(--bg); padding: 1px 6px; border-radius: 10px; flex-shrink: 0; }
.content { flex: 1; overflow-y: auto; padding: 24px; }
.content h2 { font-size: 1.25rem; margin-bottom: 4px; color: #f0f6fc; }
.content .subtitle { color: var(--muted); margin-bottom: 20px; font-size: 0.9rem; }
.skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.skill-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 16px; transition: border-color 0.15s; }
.skill-card:hover { border-color: var(--accent); }
.skill-card h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 6px; word-break: break-word; }
.skill-card .desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
.skill-card .usage {
  font-size: 0.78rem; color: var(--orange); background: rgba(210,153,29,0.08);
  padding: 4px 10px; border-radius: 4px; display: inline-block; word-break: break-word;
}
.skill-card .usage::before { content: '触发：'; color: var(--muted); }
@media (max-width: 640px) {
  .sidebar { width: 130px; min-width: 110px; }
  .sidebar-item { padding: 5px 8px; font-size: 0.75rem; }
  .skill-grid { grid-template-columns: 1fr; }
  .content { padding: 14px; }
}

    .view-toggle {
      display: flex; gap: 0; padding: 8px 8px 4px;
      border-bottom: 1px solid var(--border); margin-bottom: 4px; flex-shrink: 0;
    }
    .toggle-btn {
      flex: 1; text-align: center; padding: 3px 0; font-size: 0.72rem;
      color: var(--muted); cursor: pointer; border-radius: 4px; transition: all 0.15s; user-select: none;
    }
    .toggle-btn:hover { color: var(--text); background: rgba(88,166,255,0.06); }
    .toggle-btn.active { background: var(--accent-dim); color: #fff; }
</style>
</head>

function buildFuncGroups() {
  var fg = {};
  groupNames.forEach(function(gname) {
    var skills = groups[gname] || [];
    var funcCat = groupFuncMap[gname];
    if (funcCat) {
      if (!fg[funcCat]) fg[funcCat] = [];
      fg[funcCat] = fg[funcCat].concat(skills);
    } else {
      skills.forEach(function(s) {
        var key = s.id || s.name;
        var cat = skillFuncMap[key];
        if (cat) {
          if (!fg[cat]) fg[cat] = [];
          fg[cat].push(s);
        }
      });
    }
  });
  return fg;
}

function init() {
  var params = new URLSearchParams(window.location.search);
  var fam = params.get('family');
  if (fam && famMap[fam]) {
    currentView = 'source';
    renderSidebar('source');
    selectGroup(famMap[fam]);
  } else {
    renderSidebar('func');
    if (funcGroupNames.length > 0) selectGroup(funcGroupNames[0]);
  }
}
function renderSidebar(view) {
  currentView = view;
  var sb = document.getElementById('sidebar');
  if (!sb.querySelector('.view-toggle')) {
    var toggle = document.createElement('div');
    toggle.className = 'view-toggle';
    var btnF = document.createElement('span'); btnF.className = 'toggle-btn'; btnF.dataset.view = 'func'; btnF.textContent = '按功能';
    var btnS = document.createElement('span'); btnS.className = 'toggle-btn'; btnS.dataset.view = 'source'; btnS.textContent = '按来源';
    btnF.onclick = function() { renderSidebar('func'); };
    btnS.onclick = function() { renderSidebar('source'); };
    toggle.appendChild(btnF); toggle.appendChild(btnS);
    sb.appendChild(toggle);
  }
  var items = sb.querySelectorAll('.sidebar-item');
  for (var i = 0; i < items.length; i++) items[i].remove();
  sb.querySelectorAll('.toggle-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.view === view);
    btn.onclick = function() { renderSidebar(this.dataset.view); };
  });
  var names = view === 'func' ? funcGroupNames : groupNames;
  var source = view === 'func' ? funcGroups : groups;
  names.forEach(function(name) {
    var skills = source[name] || [];
    if (skills.length === 0) return;
    var div = document.createElement('div');
    div.className = 'sidebar-item';
    div.innerHTML = '<span>' + esc(name) + '</span><span class="count">' + skills.length + '</span>';
    div.onclick = function() { selectGroup(name); };
    sb.appendChild(div);
  });
}
function selectGroup(name) {

    var label = el.querySelector('span');

  });
  var c = document.getElementById('content');

    h += '<div class="skill-card"><h3>' + esc(s.name || s.id) + '</h3>';
    if (s.desc) h += '<p class="desc">' + esc(s.desc) + '</p>';
    if (s.usage) h += '<span class="usage">' + esc(s.usage) + '</span>';
    h += '</div>';
  });
  h += '</div>';
  c.innerHTML = h;
}
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
init();
</script>
</body>
