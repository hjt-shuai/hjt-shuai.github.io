<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子技能详情 - Agent Skills</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg-elevated: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --tag-bg: #1a2332;
    --tag-text: #79c0ff;
    --card-hover: #1c2128;
    --red: #f85149;
    --green: #3fb950;
    --yellow: #d2991d;
    --purple: #a371f7;
    --code-bg: #0d1117;
    --codex-bg: #1a2332;
    --codex-text: #79c0ff;
    --general-bg: #1a2e1a;
    --general-text: #7ee787;
    --business-color: #f0883e;
  }

  html { font-size: 15px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }

  header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
  }
  header .back {
    font-size: 0.82rem;
    color: var(--text-dim);
    text-decoration: none;
    margin-bottom: 12px;
    display: inline-block;
  }
  header .back:hover { color: var(--accent); }
  header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  header .family-desc {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-top: 8px;
    max-width: 640px;
  }
  header .family-meta {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--text-dim);
  }
  header .family-meta strong { color: var(--text); }

  .skill-list { margin: 32px 0; }

  .skill-detail-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 12px;
    transition: background 0.15s;
  }
  .skill-detail-card:hover { background: var(--card-hover); }

  .skill-detail-card .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .skill-detail-card .name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
  }
  .skill-detail-card .en-name {
    font-size: 0.78rem;
    color: var(--accent);
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    margin-bottom: 8px;
  }
  .skill-detail-card .desc {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .skill-detail-card .section-title {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .skill-detail-card .usage-box {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 0.82rem;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    color: var(--green);
    margin-bottom: 10px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .skill-detail-card .triggers {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }
  .skill-detail-card .trigger-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .skill-detail-card .copy-btn {
    display: inline-block;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 14px;
    font-size: 0.75rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .skill-detail-card .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  .skill-detail-card .copy-btn.copied { color: var(--green); border-color: var(--green); }

  .platform-badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 10px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .platform-badge.codex { background: var(--codex-bg); color: var(--codex-text); }
  .platform-badge.general { background: var(--general-bg); color: var(--general-text); }
  .platform-badge.claude { background: #2a1a1a; color: #f77878; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #0d1117;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  .not-found {
    text-align: center;
    padding: 80px 0;
    color: var(--text-dim);
  }
  .not-found h2 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text); }

  footer {
    padding: 32px 0;
    border-top: 1px solid var(--border);
    margin-top: 40px;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-align: center;
  }

  @media (max-width: 600px) {
    .container { padding: 0 16px; }
    .skill-detail-card { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <a href="index.html" class="back">← 返回技能列表</a>
    <h1 id="family-name">子技能详情</h1>
    <p class="family-desc" id="family-desc"></p>
    <div class="family-meta" id="family-meta"></div>
  </div>
</header>

<main class="container">
  <div class="skill-list" id="skill-list"></div>
  <div class="not-found" id="not-found" style="display:none">
    <h2>未找到该家族</h2>
    <p>请从技能列表页面点击家族卡片进入。</p>
  </div>
</main>

<footer>
  <div class="container">
    <a href="index.html" style="color:var(--accent);text-decoration:none">← 返回技能速查表</a>
  </div>
</footer>

<div class="toast" id="toast">已复制</div>

      { zh:"OpenCLI 自动修复", en:"opencli-autofix", platform:"general", usage:"opencli autofix <command> — 自动诊断并修复失败的 adapter", desc:"当 opencli 命令因网站 DOM/API/响应格式变化而失败时，自动收集 trace 证据、对比差异、修复 adapter 并重试。最多 3 轮自动修复，修不好则生成 GitHub issue。", triggers:["opencli 报错","adapter 坏了","autofix"] }
    ]
  }
};

const platformLabels = { codex: "Codex", general: "通用", claude: "Claude Code" };

// ── Parse family from URL ──
const params = new URLSearchParams(window.location.search);
const familyKey = params.get('family');

const family = families[familyKey];
const notFound = document.getElementById('not-found');
const skillList = document.getElementById('skill-list');

if (!family) {
  notFound.style.display = 'block';
  document.getElementById('family-name').textContent = '未找到该技能家族';
} else {
  document.getElementById('family-name').textContent = family.name;
  document.getElementById('family-desc').textContent = family.desc;
  document.getElementById('family-meta').innerHTML = 
    `共 <strong>${family.skills.length}</strong> 项子技能 · <a href="index.html" style="color:var(--accent)">返回全部技能</a>`;
  document.title = family.name + ' - Agent Skills';

  let html = '';
  family.skills.forEach((s, i) => {
    html += `
    <div class="skill-detail-card">
      <div class="card-header">
        <div>
          <div class="name">${i + 1}. ${s.zh}</div>
          <div class="en-name">${s.en}</div>
        </div>
        <span class="platform-badge ${s.platform}">${platformLabels[s.platform]}</span>
      </div>
      <div class="desc">${s.desc}</div>
      <div class="section-title">用法</div>
      <div class="usage-box">${s.usage.replace(/"/g, '&quot;')}</div>
      <div class="section-title">触发方式</div>
      <div class="triggers">${s.triggers.map(t => `<span class="trigger-tag">${t}</span>`).join('')}</div>
      <button class="copy-btn" data-cmd="${s.usage.replace(/"/g, '&quot;')}">复制命令</button>
    </div>`;
  });
  skillList.innerHTML = html;
}

// ── Copy handler ──
const toast = document.getElementById('toast');
skillList.addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  navigator.clipboard.writeText(btn.dataset.cmd).then(() => {
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    toast.classList.add('show');
    setTimeout(() => {
      btn.textContent = '复制命令';
      btn.classList.remove('copied');
      toast.classList.remove('show');
    }, 1500);
  });
});
</script>
</body>
</html>
